{% extends "app/base.html" %}
{% load static %}
{% block title %}Contact{% endblock title %}
{% block main-content %}
<div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="{% static 'app/images/banner\b1.jpg' %}" class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
            <img src="{% static 'app/images/banner/b2.jpg' %}" class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
            <img src="{% static 'app/images/banner/b3.jpg' %}" class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
            <img src="{% static 'app/images/banner/b4.jpg' %}" class="d-block w-100" alt="...">
        </div>
    </div>
</div>
<div class="container mt-3 mb-5">
    <h2 class="text-center">Contact Us</h2>
    <form action="#">
        <div class="row">
            <div class="col-lg-5 col-md-5 text-end">
                <label for="name" class="fs-4 mt-1">Name:</label><br>
                <label for="name" class="fs-4 mt-1">Address:</label><br>
                <label for="name" class="fs-4 mt-1">Phone:</label><br>
                <label for="name" class="fs-4 mt-1">Email:</label><br>
            </div>
            <div class="col-lg-5 col-md-5">
                <input type="text" class="fs-5 text-start w-75 mt-2" placeholder="Enter your Name"><br>
                <input type="text" class="fs-5 text-start w-75 mt-1" placeholder="Enter your Name"><br>
                <input type="text" class="fs-5 text-start w-75 mt-1" placeholder="Enter your Name"><br>
                <input type="text" class="fs-5 text-start w-75 mt-1" placeholder="Enter your Name"><br>
            </div>
        </div>
        <div class="container text-center mt-3">
            <button class="btn btn-success text-center">submit</button>
        </div>
    </form>
</div>
</div>
{% endblock main-content %}
